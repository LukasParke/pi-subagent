# Publish a Pi package release for:
#   pi install npm:pi-subagent@X.Y.Z
#   pi install git:github.com/LukasParke/pi-subagent@vX.Y.Z
#
# Auth: npm Trusted Publishing (OIDC). Configure on npmjs.com:
#   Organization/user: LukasParke
#   Repository:        pi-subagent
#   Workflow filename: release.yml   ← filename only, not the path
#   Environment:       (leave empty)
#   Allowed actions:   npm publish
#
# Requirements (npm docs):
#   - Node >= 22.14.0  (this workflow uses 24)
#   - npm CLI >= 11.5.1 (ships with Node 24 runners)
#   - permissions.id-token: write
#   - package.json repository.url matches this GitHub repo
#   - public repository + public package (for provenance)
#
# Trigger:
#   git tag vX.Y.Z && git push origin vX.Y.Z
#   (tag without leading v must equal package.json version)
name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# Workflow-level defaults. Job can still restate for clarity.
permissions:
  contents: write # GitHub Release + asset upload
  id-token: write # npm Trusted Publishing OIDC + provenance

jobs:
  check:
    name: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm run check
      - run: npm run pack:check

      - name: Verify tag matches package.json version
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          echo "tag_version=${TAG}"
          echo "package_version=${PKG}"
          if [ "${TAG}" != "${PKG}" ]; then
            echo "::error::Tag v${TAG} does not match package.json version ${PKG}."
            echo "Bump package.json version, commit, then retag."
            exit 1
          fi

  publish:
    name: publish
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      # Do not enable package-manager cache on release builds (npm trusted-publish guidance).
      # Do not pass a blank NODE_AUTH_TOKEN here — empty tokens break OIDC auth fallback.
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install production-adjacent deps
        run: npm ci

      - name: Verify npm tooling for Trusted Publishing
        run: |
          set -euo pipefail
          node -v
          npm -v
          # Trusted Publishing requires npm >= 11.5.1
          node -e '
            const [maj, min, pat] = process.versions.npm
              ? process.versions.npm.split(".").map(Number)
              : require("child_process").execSync("npm -v", { encoding: "utf8" }).trim().split(".").map(Number);
            const ok = maj > 11 || (maj === 11 && (min > 5 || (min === 5 && pat >= 1)));
            if (!ok) {
              console.error("npm CLI must be >= 11.5.1 for Trusted Publishing, got", process.versions.npm || "unknown");
              process.exit(1);
            }
            console.log("npm CLI ok for Trusted Publishing");
          '

      - name: Verify package repository points at this GitHub repo
        run: |
          set -euo pipefail
          node -e '
            const pkg = require("./package.json");
            const url = pkg.repository?.url || "";
            const expected = "github.com/LukasParke/pi-subagent";
            if (!String(url).includes(expected)) {
              console.error("package.json repository.url must match", expected, "got", url);
              process.exit(1);
            }
            console.log("repository.url ok:", url);
          '

      - name: Build npm pack artifact
        id: pack
        run: |
          set -euo pipefail
          TGZ="$(npm pack --pack-destination "${RUNNER_TEMP}" | tail -n1)"
          echo "tgz=${RUNNER_TEMP}/${TGZ}" >> "${GITHUB_OUTPUT}"
          echo "filename=${TGZ}" >> "${GITHUB_OUTPUT}"
          ls -la "${RUNNER_TEMP}/${TGZ}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          NOTES="$(cat <<EOF
          ## pi-subagent ${VERSION}

          Production-grade isolated subagents for [Pi](https://pi.dev).

          ### Install with Pi

          \`\`\`bash
          # npm (surfaces on pi.dev gallery via the pi-package keyword)
          pi install npm:pi-subagent@${VERSION}

          # git pin (this release tag)
          pi install git:github.com/LukasParke/pi-subagent@${TAG}
          \`\`\`

          After install, Pi registers:

          - tool: \`subagent\`
          - command: \`/subagents\`

          See [README](https://github.com/LukasParke/pi-subagent#readme) and [docs/RELEASING.md](https://github.com/LukasParke/pi-subagent/blob/main/docs/RELEASING.md).
          EOF
          )"

          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "Release ${TAG} already exists; uploading asset if needed."
            gh release upload "${TAG}" "${{ steps.pack.outputs.tgz }}" --clobber
          else
            gh release create "${TAG}" \
              --title "pi-subagent ${VERSION}" \
              --notes "${NOTES}" \
              "${{ steps.pack.outputs.tgz }}"
          fi

      - name: Publish to npm (Trusted Publishing / OIDC)
        # Pure OIDC path: no NODE_AUTH_TOKEN. Provenance is automatic with trusted publishing.
        # package.json publishConfig.provenance remains true as a belt-and-suspenders default.
        run: |
          set -euo pipefail
          # Ensure a blank token is not injected by the runner environment or prior steps.
          unset NODE_AUTH_TOKEN || true
          unset NPM_TOKEN || true
          npm publish --access public --ignore-scripts
